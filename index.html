<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Favorite Person ❤️</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    overflow:hidden;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    max-width:600px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    z-index:10;
}

h1{
    color:#ff4d6d;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:10px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

#message{
    margin-top:25px;
    font-size:20px;
    color:#333;
    min-height:60px;
}

.heart{
    position:fixed;
    bottom:-20px;
    color:rgba(255,77,109,0.7);
    animation:floatUp linear forwards;
    pointer-events:none;
}

@keyframes floatUp{

    from{
        transform:translateY(0);
        opacity:1;
    }

    to{
        transform:translateY(-110vh);
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="card">

    <h1>Hey Beautiful ❤️</h1>

    <p>
        I know your graduation project is stressing you out,
        so I made this little place to remind you how amazing you are.
    </p>

    <button id="motivationBtn" onclick="showMessage()">
        Click Me ❤️
    </button>

    <div id="message"></div>

</div>

<script>

const messages = [

"You're stronger than you think ❤️",

"I'm so proud of how hard you're working 🌷",

"You've already come so far, don't stop now 💪",

"Your project doesn't define your worth ✨",

"Every step you take gets you closer to success 🏁",

"I believe in you completely ❤️",

"One day you'll be proud that you kept going 🌸",

"Take a breath, you're doing great 🌷",

"The stress is temporary, your success is forever ✨",

"Remember that someone loves you very much ❤️",

"You are capable of amazing things 💕",

"No matter what happens, I'm proud of you ❤️"

];

const buttonTexts = [

"Need A Hug? 🤗",
"One More ❤️",
"Make Me Smile 😊",
"I Miss You 💕",
"Again! ❤️",
"More Motivation ✨",
"Keep Going 🌷",
"You're Amazing 🌸"

];

let buttonIndex = 0;

function showMessage(){

    const randomMessage =
    messages[Math.floor(Math.random() * messages.length)];

    document.getElementById("message").innerHTML =
    randomMessage;

    document.getElementById("motivationBtn").innerHTML =
    buttonTexts[buttonIndex % buttonTexts.length];

    buttonIndex++;
}

function createHeart(){

    const heart = document.createElement("div");

    const hearts = ["❤️","💕","💖","💗","💘"];

    heart.classList.add("heart");

    heart.innerHTML =
    hearts[Math.floor(Math.random() * hearts.length)];

    heart.style.left =
    Math.random() * 100 + "vw";

    heart.style.fontSize =
    (Math.random() * 20 + 15) + "px";

    const duration =
    Math.random() * 4 + 4;

    heart.style.animationDuration =
    duration + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, duration * 1000);
}

setInterval(createHeart, 300);

</script>

</body>
</html>
